<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cultivated Technology Group">
  <title>Cultivated Technology Group</title>
  <defs>
    <linearGradient id="ctg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22201C"/>
      <stop offset="1" stop-color="#141210"/>
    </linearGradient>
  </defs>

  <!-- Disc -->
  <circle cx="32" cy="32" r="32" fill="url(#ctg-bg)"/>

  <!-- Subtle inner ring -->
  <circle cx="32" cy="32" r="28.5" fill="none" stroke="#F5F2EC" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Soil line -->
  <path d="M16 47 H48" stroke="#F5F2EC" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="22" cy="50" r="1.1" fill="#F5F2EC" fill-opacity="0.35"/>
  <circle cx="32" cy="51" r="1.1" fill="#F5F2EC" fill-opacity="0.35"/>
  <circle cx="42" cy="50" r="1.1" fill="#F5F2EC" fill-opacity="0.35"/>

  <!-- Stem -->
  <path d="M32 47 V25"
        fill="none" stroke="#F5F2EC" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M32 33
           C 22 33, 16 27, 15 18
           C 25 19, 31 25, 32 33 Z"
        fill="#8FAE82"/>

  <!-- Right leaf -->
  <path d="M32 27
           C 42 27, 48 21, 49 12
           C 39 13, 33 19, 32 27 Z"
        fill="#A9C29B"/>

  <!-- Tech node at growth tip -->
  <circle cx="32" cy="25" r="2.2" fill="#F5F2EC"/>
  <circle cx="32" cy="25" r="1" fill="#8FAE82"/>
</svg>
